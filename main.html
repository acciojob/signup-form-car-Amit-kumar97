<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by the student -->
	<form>
		<!-- Name -->
		<label for='name'>Name:</label>
		<input type="text" id='name' placeholder='Name' required><br>\

		<!-- Email -->
		<label for='email'>Email:</label>
		<input type="email" id=email placeholder='Email' required> <br>

		<!-- Gender -->
		<input type='radio' id='gender_f' required>
		<label for='gender_female'>Female</label>
		
		<input type="radio" id='gender_m' required> 
		<label for='gender_male'>Male</label<br>

		<!-- Car Brands -->
		<label for='cars'>Car Brands:</label>
		<select id='cars' required>
			<option id=''>--Please choose an option--</option>
		</select>
		<br>

		<!-- Age -->
		<label for='age'>Age:</label>
		<input type='number' id='age' placeholder='Age' required><br>

		<!-- DOB -->
		<label for='DOB'>DOB:</label>
		<input type='date' id='dob' required><br>

		<!-- Phone Number -->
		<label for='tel'>Phone Number:</label>
		<input type="tel" id='tel' placeholder='xxx-xxx-xxxx'> <br>

		<!-- Password -->
		<label for='password'>Password: </label>
		<input type='password' id='password' placeholder='Password' required><br>

		<!-- Terms of Service -->
		<input type='checkbox' id='tos' required>
		<label for='tos'>I agree to the Terms of Service</label>
	</form>
	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
